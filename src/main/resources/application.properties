spring.application.name=StudentManagementSystem

# Disable Spring Boot debug mode
debug=false

# Disable startup info
spring.main.log-startup-info=false

# Disable condition evaluation report logs
logging.level.org.springframework.boot.autoconfigure=OFF
logging.level.org.springframework.boot.autoconfigure.logging.ConditionEvaluationReportLogger=OFF

logging.level.root=ERROR
logging.level.org.springframework=ERROR
logging.level.org.hibernate=ERROR
logging.level.org.springdoc=ERROR

########################DB configuration########################
spring.datasource.url=jdbc:postgresql://localhost:5432/studentDB
spring.datasource.username=postgres
spring.datasource.password=kartik

#########################SQL logs#################
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=update